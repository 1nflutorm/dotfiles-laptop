# -- Window and layer rules -- #

# -- Window rules

# Ignore maximize requests
windowrule = match:class .*, suppress_event maximize

# Remove the right-click menu blurring in Chromium browsers
windowrule = no_blur on, match:class .*

# Remove the weird pop-up behavior in VSCode
windowrule = match:class ^(codium)$, focus_on_activate on
windowrule = match:class ^(codium)$, min_size 1 1

# Make file picker windows floating
windowrule = match:title ^(Open File|Open Folder|Open|Save|Save As|Export|Import|Choose File|Rename|script-fu|kdenlive|brave)$, float on
windowrule = match:class (xdg-desktop-portal-gtk)$, float on
windowrule = match:class (xdg-desktop-portal-hyprland)$, float on
windowrule = match:class (Xdg-desktop-portal-gtk)$, float on
windowrule = match:class (Xdg-desktop-portal-hyprland)$, float on

# Disable borders for swaync
windowrule = match:class (swaync)$, border_size 0

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on

# Make browsers opaque
#windowrule = opacity 1.0 override, class:(zen|librewolf|firefox|brave)

# Make dialog windows floating
windowrule = match:class ^(yad)$, float on
windowrule = match:class ^(yad)$, center on

# Greetings
windowrule = match:title ^(greeting)$, float on
windowrule = match:title ^(greeting)$, center on
windowrule = match:title ^(greeting)$, size 1000 300
windowrule = match:title ^(greeting)$, animation gnomed

# -- Layer rules

# Blur Waybar
layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0.5
layerrule = match:namespace waybar, no_anim on

# Blur swaync
layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-notification-window, blur on

layerrule = match:namespace swaync-control-center, ignore_alpha 0
layerrule = match:namespace swaync-notification-window, ignore_alpha 0

layerrule = match:namespace swaync-control-center, ignore_alpha 0.5
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.5

# Blur wlogout
layerrule = match:namespace logout_dialog, blur on
layerrule = match:namespace logout_dialog, animation fade

# Rofi
#layerrule = dimaround, rofi
# layerrule = blur, rofi
layerrule = match:namespace rofi, animation popin 95%

# Hyprpicker
layerrule = match:namespace hyprpicker, animation fade